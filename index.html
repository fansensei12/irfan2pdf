<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irfan2PDF - Advanced Auto-Fit & Compression</title>
    <!-- Menggunakan Tailwind CSS untuk styling modern -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Library jsPDF untuk konversi ke PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 via-slate-900 to-black min-h-screen flex flex-col items-center justify-center p-4 font-sans antialiased">

    <!-- Kotak Utama -->
    <div class="bg-black p-8 rounded-2xl shadow-[0_0_30px_rgba(239,68,68,0.2)] w-full max-w-2xl text-center border-2 border-red-600">
        
        <!-- Nama Aplikasi -->
        <h1 class="text-4xl font-black tracking-tight text-white mb-1">
            Irfan<span class="text-red-500">2PDF</span>
        </h1>
        <p class="text-xs uppercase tracking-widest text-gray-400 font-medium mb-6">Smart Auto-Fit Image-to-PDF Converter</p>

        <!-- Area Dropzone -->
        <div id="dropzone" class="border-2 border-dashed border-red-500 rounded-xl p-8 bg-zinc-900/50 hover:bg-zinc-900 hover:border-red-400 cursor-pointer transition-all duration-300 mb-6 group">
            <input type="file" id="fileInput" accept="image/jpeg, image/png" multiple class="hidden">
            
            <svg class="mx-auto h-12 w-12 text-red-500 group-hover:scale-110 transition-transform duration-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            
            <p class="text-gray-200 font-semibold text-sm uppercase tracking-wide">Drag & Drop Images Here</p>
            <p class="text-xs text-gray-400 mt-1">Mendukung Ukuran Kustom, Kompresi Standar, dan Target < 500 KB</p>
        </div>

        <!-- Bagian Pengaturan & Preview (Hanya Muncul Jika Gambar Sudah Ada) -->
        <div id="previewSection" class="hidden mb-6 text-left">
            
            <!-- Input Nama File Kustom -->
            <div class="mb-4">
                <label for="pdfNameInput" class="block text-xs uppercase tracking-wider text-red-400 font-bold mb-2">Nama File PDF Hasil</label>
                <input type="text" id="pdfNameInput" placeholder="Masukkan nama file (Contoh: Irfan - Tugas PKn)" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white placeholder-zinc-500 focus:outline-none focus:border-red-500 transition-colors duration-200">
            </div>

            <!-- Tiga Pilihan Kompresi Elegan -->
            <div class="mb-5 bg-zinc-900 p-4 border border-zinc-800 rounded-xl">
                <span class="block text-xs uppercase tracking-wider text-red-400 font-bold mb-3">Ukuran & Kualitas Hasil PDF</span>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                    <!-- Opsi 1: Kompres Standar -->
                    <label class="flex items-center gap-3 p-3 bg-zinc-950 rounded-lg border border-zinc-800 cursor-pointer hover:border-red-500 transition-colors duration-150 group">
                        <input type="radio" name="compressionOpt" value="compress" checked class="accent-red-600 h-4 w-4">
                        <div>
                            <p class="text-xs font-semibold text-white group-hover:text-red-400 transition-colors duration-150">Kompres Standar</p>
                            <p class="text-[10px] text-gray-400 mt-0.5">Hemat kuota & cepat</p>
                        </div>
                    </label>
                    
                    <!-- Opsi 2: Di bawah 500KB (Sudah Diperbaiki) -->
                    <label class="flex items-center gap-3 p-3 bg-zinc-950 rounded-lg border border-zinc-800 cursor-pointer hover:border-red-500 transition-colors duration-150 group">
                        <input type="radio" name="compressionOpt" value="extreme" class="accent-red-600 h-4 w-4">
                        <div>
                            <p class="text-xs font-semibold text-white group-hover:text-red-400 transition-colors duration-150">Ukuran Tugas (&lt;500KB)</p>
                            <p class="text-[10px] text-gray-400 mt-0.5">Rekomendasi pas untuk e-learning</p>
                        </div>
                    </label>

                    <!-- Opsi 3: Kualitas Asli -->
                    <label class="flex items-center gap-3 p-3 bg-zinc-950 rounded-lg border border-zinc-800 cursor-pointer hover:border-red-500 transition-colors duration-150 group">
                        <input type="radio" name="compressionOpt" value="full" class="accent-red-600 h-4 w-4">
                        <div>
                            <p class="text-xs font-semibold text-white group-hover:text-red-400 transition-colors duration-150">Kualitas Full (Asli)</p>
                            <p class="text-[10px] text-gray-400 mt-0.5">Resolusi asli tanpa dikompres</p>
                        </div>
                    </label>
                </div>
            </div>

            <p class="text-xs uppercase tracking-wider text-red-400 font-bold mb-3">Preview & Dimensi Asli</p>
            <div id="previewContainer" class="grid grid-cols-2 sm:grid-cols-3 gap-4 max-h-64 overflow-y-auto p-3 bg-zinc-900 border border-zinc-800 rounded-lg"></div>
        </div>

        <!-- Grup Tombol Aksi (Convert dan Reset) -->
        <div id="actionButtons" class="grid grid-cols-3 gap-3 hidden">
            <!-- Tombol Batal / Hapus Semua Gambar -->
            <button id="resetBtn" class="bg-zinc-800 hover:bg-zinc-700 text-gray-300 font-bold py-3.5 px-4 rounded-xl tracking-wider text-xs uppercase transition-all duration-200 cursor-pointer">
                Hapus Semua
            </button>
            
            <!-- Tombol Utama Konversi -->
            <button id="convertBtn" class="col-span-2 bg-red-600 hover:bg-red-700 text-white font-bold py-3.5 px-6 rounded-xl shadow-[0_4px_20px_rgba(239,68,68,0.4)] tracking-wider text-sm uppercase transition-all duration-200 cursor-pointer disabled:bg-zinc-700 disabled:text-zinc-500 disabled:shadow-none disabled:cursor-not-allowed">
                Convert & Download PDF
            </button>
        </div>
    </div>

    <!-- Tombol Tautan Aktif Ke Portal Tugas -->
    <div class="mt-6 w-full max-w-2xl px-2">
        <a href="https://fansensei12.github.io/Portal-Sumatif-PKn/" target="_blank" class="flex items-center justify-center gap-2 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-6 rounded-xl shadow-[0_4px_15px_rgba(37,99,235,0.3)] tracking-wide text-sm uppercase transition-all duration-200 text-center">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            Form Pengumpulan Tugas
        </a>
    </div>

    <!-- Footer -->
    <p class="text-[10px] uppercase tracking-widest text-gray-500 mt-6">100% Local Conversion • Multi-Format Auto-Detection</p>

    <script>
        const { jsPDF } = window.jspdf;
        
        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const previewSection = document.getElementById('previewSection');
        const pdfNameInput = document.getElementById('pdfNameInput');
        const previewContainer = document.getElementById('previewContainer');
        const actionButtons = document.getElementById('actionButtons');
        const convertBtn = document.getElementById('convertBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        let uploadedFiles = [];

        dropzone.addEventListener('click', () => fileInput.click());

        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('bg-zinc-900', 'border-red-400');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('bg-zinc-900', 'border-red-400');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('bg-zinc-900', 'border-red-400');
            addFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            addFiles(e.target.files);
        });

        function addFiles(files) {
            const validFiles = Array.from(files).filter(file => file.type === "image/jpeg" || file.type === "image/png");
            uploadedFiles = [...uploadedFiles, ...validFiles];
            renderPreviews();
        }

        function removeFile(index) {
            uploadedFiles.splice(index, 1);
            renderPreviews();
        }

        resetBtn.addEventListener('click', () => {
            uploadedFiles = [];
            fileInput.value = '';
            pdfNameInput.value = '';
            renderPreviews();
        });

        function renderPreviews() {
            previewContainer.innerHTML = '';

            if (uploadedFiles.length === 0) {
                previewSection.classList.add('hidden');
                actionButtons.classList.add('hidden');
                fileInput.value = '';
                pdfNameInput.value = '';
                return;
            }

            previewSection.classList.remove('hidden');
            actionButtons.classList.remove('hidden');

            uploadedFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgWrapper = document.createElement('div');
                    imgWrapper.className = 'relative aspect-square border border-zinc-700 rounded-md overflow-hidden bg-zinc-950 shadow-sm flex items-center justify-center group';
                    
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'max-w-full max-h-full object-contain';
                    
                    img.onload = function() {
                        const width = this.naturalWidth;
                        const height = this.naturalHeight;
                        let typeLabel = "Kustom";
                        
                        const ratio = width / height;
                        if (Math.abs(ratio - (16/9)) < 0.05) typeLabel = "16:9";
                        else if (Math.abs(ratio - (9/16)) < 0.05) typeLabel = "16:9 V";
                        else if (Math.abs(ratio - 1) < 0.01) typeLabel = "1:1";
                        else if (ratio > 1) typeLabel = "Lndscp";
                        else typeLabel = "Ptrt";

                        const infoBadge = document.createElement('span');
                        infoBadge.className = 'absolute bottom-1 right-1 bg-red-600/90 text-white text-[9px] font-bold px-1.5 py-0.5 rounded';
                        infoBadge.innerText = `${typeLabel}`;
                        imgWrapper.appendChild(infoBadge);
                    };

                    const slideBadge = document.createElement('span');
                    slideBadge.className = 'absolute top-1 left-1 bg-black/70 text-white text-[10px] font-bold px-1.5 py-0.5 rounded';
                    slideBadge.innerText = `Hal ${index + 1}`;
                    
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'absolute top-1 right-1 bg-red-600 hover:bg-red-700 text-white font-black text-[10px] rounded-full w-5 h-5 flex items-center justify-center shadow-md border border-black/50 transition-transform duration-150 hover:scale-110 cursor-pointer z-10';
                    deleteBtn.innerHTML = '✕';
                    deleteBtn.addEventListener('click', (event) => {
                        event.stopPropagation();
                        removeFile(index);
                    });
                    
                    imgWrapper.appendChild(img);
                    imgWrapper.appendChild(slideBadge);
                    imgWrapper.appendChild(deleteBtn);
                    previewContainer.appendChild(imgWrapper);
                }
                reader.readAsDataURL(file);
            });
        }

        convertBtn.addEventListener('click', async () => {
            if (uploadedFiles.length === 0) return;

            const selectedCompression = document.querySelector('input[name="compressionOpt"]:checked').value;

            convertBtn.disabled = true;
            resetBtn.disabled = true;
            pdfNameInput.disabled = true;
            convertBtn.innerText = "Processing PDF...";

            let pdf;

            for (let i = 0; i < uploadedFiles.length; i++) {
                const file = uploadedFiles[i];
                let imageData = await loadImage(file);
                
                const imgDetails = await getImageDetails(imageData);
                let imgWidth = imgDetails.width;
                let imgHeight = imgDetails.height;

                // Logika Khusus Kompresi Target Ukuran Maksimal 500 KB per halaman
                if (selectedCompression === "extreme") {
                    imageData = await compressToTargetSize(imgDetails, 500 * 1024); // Target disetel ke 500 KB
                    const newDetails = await getImageDetails(imageData);
                    imgWidth = newDetails.width;
                    imgHeight = newDetails.height;
                }

                const orientation = imgWidth > imgHeight ? 'l' : 'p';

                if (i === 0) {
                    pdf = new jsPDF({
                        orientation: orientation,
                        unit: 'pt',
                        format: [imgWidth, imgHeight]
                    });
                } else {
                    pdf.addPage([imgWidth, imgHeight], orientation);
                }

                if (selectedCompression === "compress" || selectedCompression === "extreme") {
                    pdf.addImage(imageData, 'JPEG', 0, 0, imgWidth, imgHeight, undefined, 'FAST');
                } else {
                    pdf.addImage(imageData, 'JPEG', 0, 0, imgWidth, imgHeight, undefined, 'NONE');
                }
            }

            let finalFileName = pdfNameInput.value.trim();
            if (finalFileName === "") {
                finalFileName = uploadedFiles[0].name.split('.').slice(0, -1).join('.') + `_${selectedCompression}`;
            }
            
            pdf.save(finalFileName + '.pdf');

            convertBtn.disabled = false;
            resetBtn.disabled = false;
            pdfNameInput.disabled = false;
            convertBtn.innerText = "Convert & Download PDF";
        });

        // Fungsi kompresi bertahap yang mengunci target di bawah 500 KB
        function compressToTargetSize(imgElement, targetBytes) {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                let width = imgElement.width;
                let height = imgElement.height;
                
                // Pembatasan resolusi dasar agar proses kalkulasi lebih cepat
                const maxDimension = 2000; 
                if (width > maxDimension || height > maxDimension) {
                    if (width > height) {
                        height *= maxDimension / width;
                        width = maxDimension;
                    } else {
                        width *= maxDimension / height;
                        height = maxDimension;
                    }
                }

                canvas.width = width;
                canvas.height = height;
                ctx.drawImage(imgElement, 0, 0, width, height);

                let quality = 0.85; // Memulai dari kualitas prima 85%
                let dataUrl = canvas.toDataURL('image/jpeg', quality);
                let currentSize = Math.round((dataUrl.split(',')[1].length * 3) / 4);

                // Mengulang penurunan kualitas hanya jika file di atas 500 KB
                while (currentSize > targetBytes && quality > 0.20) {
                    quality -= 0.08; 
                    dataUrl = canvas.toDataURL('image/jpeg', quality);
                    currentSize = Math.round((dataUrl.split(',')[1].length * 3) / 4);
                }

                resolve(dataUrl);
            });
        }

        function loadImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        function getImageDetails(src) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.src = src;
            });
        }
    </script>
</body>
</html>
