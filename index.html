<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irfan2PDF - Auto-Fit Page Size Converter</title>
    <!-- Menggunakan Tailwind CSS untuk styling modern -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Library jsPDF untuk konversi ke PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 via-slate-900 to-black min-h-screen flex flex-col items-center justify-center p-4 font-sans antialiased">

    <!-- Kotak Utama -->
    <div class="bg-black p-8 rounded-2xl shadow-[0_0_30px_rgba(239,68,68,0.2)] w-full max-w-2xl text-center border-2 border-red-600">
        
        <!-- Nama Aplikasi -->
        <h1 class="text-4xl font-black tracking-tight text-white mb-1">
            Irfan<span class="text-red-500">2PDF</span>
        </h1>
        <p class="text-xs uppercase tracking-widest text-gray-400 font-medium mb-6">Smart Auto-Fit Image-to-PDF Converter</p>

        <!-- Area Dropzone -->
        <div id="dropzone" class="border-2 border-dashed border-red-500 rounded-xl p-8 bg-zinc-900/50 hover:bg-zinc-900 hover:border-red-400 cursor-pointer transition-all duration-300 mb-6 group">
            <input type="file" id="fileInput" accept="image/jpeg, image/png" multiple class="hidden">
            
            <svg class="mx-auto h-12 w-12 text-red-500 group-hover:scale-110 transition-transform duration-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            
            <p class="text-gray-200 font-semibold text-sm uppercase tracking-wide">Drag & Drop Images Here</p>
            <p class="text-xs text-gray-400 mt-1">Mendukung semua ukuran gambar (A4, F4, 16:9, Persegi, dll)</p>
        </div>

        <!-- Pratinjau Gambar Dinamis -->
        <div id="previewSection" class="hidden mb-6">
            <p class="text-xs uppercase tracking-wider text-red-400 font-bold mb-3 text-left">Preview & Dimensi Asli</p>
            <!-- Menggunakan susunan grid yang fleksibel -->
            <div id="previewContainer" class="grid grid-cols-2 sm:grid-cols-3 gap-4 max-h-64 overflow-y-auto p-3 bg-zinc-900 border border-zinc-800 rounded-lg"></div>
        </div>

        <!-- Tombol Aksi -->
        <button id="convertBtn" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3.5 px-6 rounded-xl shadow-[0_4px_20px_rgba(239,68,68,0.4)] tracking-wider text-sm uppercase transition-all duration-200 cursor-pointer disabled:bg-zinc-700 disabled:text-zinc-500 disabled:shadow-none disabled:cursor-not-allowed hidden">
            Convert & Download Smart PDF
        </button>
    </div>

    <!-- Footer -->
    <p class="text-[10px] uppercase tracking-widest text-gray-400 mt-6">100% Local Conversion • Multi-Format Auto-Detection</p>

    <script>
        const { jsPDF } = window.jspdf;
        
        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const previewSection = document.getElementById('previewSection');
        const previewContainer = document.getElementById('previewContainer');
        const convertBtn = document.getElementById('convertBtn');
        
        let uploadedFiles = [];

        dropzone.addEventListener('click', () => fileInput.click());

        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('bg-zinc-900', 'border-red-400');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('bg-zinc-900', 'border-red-400');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('bg-zinc-900', 'border-red-400');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            uploadedFiles = Array.from(files).filter(file => file.type === "image/jpeg" || file.type === "image/png");

            if (uploadedFiles.length === 0) return;

            previewContainer.innerHTML = '';
            previewSection.classList.remove('hidden');
            convertBtn.classList.remove('hidden');

            uploadedFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgWrapper = document.createElement('div');
                    imgWrapper.className = 'relative aspect-square border border-zinc-700 rounded-md overflow-hidden bg-zinc-950 shadow-sm flex items-center justify-center';
                    
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'max-w-full max-h-full object-contain';
                    
                    // Deteksi rasio asli gambar untuk ditampilkan pada badge teks preview
                    img.onload = function() {
                        const width = this.naturalWidth;
                        const height = this.naturalHeight;
                        let typeLabel = "Kustom";
                        
                        const ratio = width / height;
                        if (Math.abs(ratio - (16/9)) < 0.05) typeLabel = "16:9";
                        else if (Math.abs(ratio - (9/16)) < 0.05) typeLabel = "16:9 Vertikal";
                        else if (Math.abs(ratio - 1) < 0.01) typeLabel = "1:1 Kotak";
                        else if (ratio > 1) typeLabel = "Landscape";
                        else typeLabel = "Potret";

                        const infoBadge = document.createElement('span');
                        infoBadge.className = 'absolute bottom-1 right-1 bg-red-600/90 text-white text-[9px] font-bold px-1.5 py-0.5 rounded';
                        infoBadge.innerText = `${typeLabel}`;
                        imgWrapper.appendChild(infoBadge);
                    };

                    const slideBadge = document.createElement('span');
                    slideBadge.className = 'absolute top-1 left-1 bg-black/70 text-white text-[10px] font-bold px-1.5 py-0.5 rounded';
                    slideBadge.innerText = `Hal ${index + 1}`;
                    
                    imgWrapper.appendChild(img);
                    imgWrapper.appendChild(slideBadge);
                    previewContainer.appendChild(imgWrapper);
                }
                reader.readAsDataURL(file);
            });
        }

        convertBtn.addEventListener('click', async () => {
            if (uploadedFiles.length === 0) return;

            convertBtn.disabled = true;
            convertBtn.innerText = "Processing Dimensions...";

            let pdf;

            for (let i = 0; i < uploadedFiles.length; i++) {
                const file = uploadedFiles[i];
                const imageData = await loadImage(file);
                
                // Mengambil spesifikasi dimensi piksel asli dari file gambar
                const img = await getImageDetails(imageData);
                const imgWidth = img.width;
                const imgHeight = img.height;

                // Mengubah orientasi halaman pdf berdasarkan aspek rasio gambar asli
                const orientation = imgWidth > imgHeight ? 'l' : 'p';

                // Membuat halaman baru dengan ukuran kustom yang sama persis dengan piksel gambar (menggunakan unit pt/poin)
                if (i === 0) {
                    pdf = new jsPDF({
                        orientation: orientation,
                        unit: 'pt',
                        format: [imgWidth, imgHeight]
                    });
                } else {
                    pdf.addPage([imgWidth, imgHeight], orientation);
                }

                // Memasukkan gambar secara penuh (0, 0) memenuhi halaman PDF kustom tersebut
                pdf.addImage(imageData, 'JPEG', 0, 0, imgWidth, imgHeight);
            }

            const fileName = uploadedFiles[0].name.split('.').slice(0, -1).join('.') + '_AutoFit.pdf';
            pdf.save(fileName);

            convertBtn.disabled = false;
            convertBtn.innerText = "Convert & Download Smart PDF";
        });

        function loadImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        // Helper untuk mendapatkan resolusi asli gambar
        function getImageDetails(src) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.src = src;
            });
        }
    </script>
</body>
</html>
